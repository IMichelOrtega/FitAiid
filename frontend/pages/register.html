<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Usuario - FitAiid</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="../scripts/config.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --red: #ff0000;
      --red-mid: #cc0000;
      --red-dim: rgba(255, 0, 0, 0.12);
      --red-glow: rgba(255, 0, 0, 0.25);
      --black: #000;
      --dark: #0a0a0a;
      --dark2: #111;
      --card: #0e0e0e;
      --border: rgba(255, 0, 0, 0.18);
      --text: #f0f0f0;
      --muted: #888;
      --input-bg: rgba(20, 20, 20, 0.6);
      --input-border: rgba(255, 255, 255, 0.08);
    }

    html,
    body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: var(--black);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
    }

    /* ══════════════════════════════════════════════════════════════════════════
       BACKGROUND LAYERS - Más dinámico y moderno
    ══════════════════════════════════════════════════════════════════════════ */
    
    .bg-layer {
      position: fixed;
      inset: 0;
      background: url('https://img.freepik.com/fotos-premium/gimnasio-luces-rojas-luz-roja-techo_1177960-12802.jpg') center/cover no-repeat;
      filter: brightness(0.15) saturate(1.6) contrast(1.1);
      transform: scale(1.08);
      animation: bgDrift 25s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgDrift {
      from { transform: scale(1.08) translate(0, 0); }
      to { transform: scale(1.12) translate(-2%, -1.5%); }
    }

    .bg-pulse {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 75% 65% at 50% 45%, var(--red-glow) 0%, transparent 70%);
      z-index: 1;
      animation: pulseGlow 6s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }

    .bg-fade {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, 
        rgba(0, 0, 0, 0.92) 0%, 
        transparent 20%, 
        transparent 80%, 
        rgba(0, 0, 0, 0.92) 100%);
      z-index: 2;
    }

    /* Grid overlay sutil */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 2;
      opacity: 0.3;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       HUD CORNERS - Más elegantes
    ══════════════════════════════════════════════════════════════════════════ */
    
    .hud-corner {
      position: fixed;
      width: 60px;
      height: 60px;
      z-index: 3;
    }

    .hud-corner::before,
    .hud-corner::after {
      content: '';
      position: absolute;
      background: linear-gradient(90deg, var(--red) 0%, transparent 100%);
    }

    .hud-corner::before {
      width: 100%;
      height: 2px;
      top: 0;
      left: 0;
    }

    .hud-corner::after {
      width: 2px;
      height: 100%;
      top: 0;
      left: 0;
      background: linear-gradient(180deg, var(--red) 0%, transparent 100%);
    }

    .hc-tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .hc-bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .hc-br { bottom: 24px; right: 24px; transform: scale(-1, -1); }
    .hc-tl { top: 24px; left: 24px; }

    /* ══════════════════════════════════════════════════════════════════════════
       LOGO - Más moderno
    ══════════════════════════════════════════════════════════════════════════ */
    
    .site-logo {
      position: fixed;
      top: 42px;
      left: 48px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-badge {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-mid) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 
        0 0 20px rgba(255, 0, 0, 0.4),
        0 4px 12px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
    }

    .logo-image {
      width: 44px;
      height: 44px;
      object-fit: contain;
      display: block;
    }

    .logo-badge::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
      transform: translateX(-100%);
      animation: logoShine 3s ease-in-out infinite;
    }

    @keyframes logoShine {
      to { transform: translateX(100%); }
    }

    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1;
      text-shadow: 0 2px 10px rgba(255, 0, 0, 0.3);
    }

    .logo-sub {
      font-size: 11px;
      color: var(--red);
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       CLOSE BUTTON - Mejorado
    ══════════════════════════════════════════════════════════════════════════ */
    
    .close-btn {
      position: fixed;
      top: 38px;
      right: 42px;
      z-index: 20;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20, 20, 20, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #666;
      font-size: 22px;
      font-weight: 300;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: rgba(255, 0, 0, 0.1);
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
      transform: rotate(90deg);
    }

    /* ══════════════════════════════════════════════════════════════════════════
       MAIN CARD - Más sofisticado
    ══════════════════════════════════════════════════════════════════════════ */
    
    .register-container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      background: rgba(12, 12, 12, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255, 0, 0, 0.08) inset,
        0 30px 80px rgba(0, 0, 0, 0.8),
        0 0 60px rgba(255, 0, 0, 0.08);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .register-container::-webkit-scrollbar { width: 6px; }
    .register-container::-webkit-scrollbar-track { background: transparent; }
    .register-container::-webkit-scrollbar-thumb { 
      background: rgba(255, 0, 0, 0.3); 
      border-radius: 3px; 
    }
    .register-container::-webkit-scrollbar-thumb:hover { 
      background: rgba(255, 0, 0, 0.5); 
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Borde superior con gradiente */
    .register-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 3px;
      background: linear-gradient(to right, 
        transparent, 
        var(--red) 30%, 
        var(--red) 70%, 
        transparent);
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
      border-radius: 20px 20px 0 0;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════════════════════════════════════ */
    
    .card-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 0, 0, 0.12);
      position: relative;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 80px;
      height: 2px;
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .register-container h2 {
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 48px !important;
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px !important;
      line-height: 1 !important;
      margin: 0 !important;
      text-align: left !important;
    }

    .header-right {
      text-align: right;
    }

    .step-indicator {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.15) 0%, rgba(255, 0, 0, 0.05) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -2px;
      user-select: none;
    }

    .step-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       MESSAGE BOX
    ══════════════════════════════════════════════════════════════════════════ */
    
    #msgBox {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
      animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #msgBox::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .msg-success {
      background: rgba(0, 200, 80, 0.12) !important;
      color: #00ff6a !important;
      border: 1px solid rgba(0, 200, 80, 0.3) !important;
    }

    .msg-success::before {
      background: linear-gradient(to right, transparent, #00ff6a, transparent);
    }

    .msg-error {
      background: rgba(255, 0, 0, 0.1) !important;
      color: #ff5555 !important;
      border: 1px solid rgba(255, 0, 0, 0.3) !important;
    }

    .msg-error::before {
      background: linear-gradient(to right, transparent, #ff0000, transparent);
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-box.hiding {
      animation: msgOut 0.5s ease forwards;
    }

    @keyframes msgOut {
      from { opacity: 1; }
      to { opacity: 0; transform: translateY(-8px); }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       FORM LAYOUT
    ══════════════════════════════════════════════════════════════════════════ */
    
    #registerForm {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 24px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .field-wrap {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .field-wrap label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       INPUTS - Más modernos
    ══════════════════════════════════════════════════════════════════════════ */
    
    .register-container input,
    .register-container select {
      width: 100% !important;
      background: var(--input-bg) !important;
      border: 1.5px solid var(--input-border) !important;
      border-radius: 10px !important;
      padding: 13px 16px !important;
      font-family: 'Poppins', sans-serif !important;
      font-size: 14px !important;
      color: var(--text) !important;
      outline: none !important;
      margin-bottom: 0 !important;
      box-sizing: border-box !important;
      transition: all 0.3s ease !important;
    }

    .register-container input::placeholder {
      color: #444 !important;
    }

    .register-container input:focus {
      border-color: var(--red) !important;
      background: rgba(255, 0, 0, 0.05) !important;
      box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.08) !important;
    }

    /* Password containers */
    .password-container {
      position: relative;
      width: 100% !important;
      margin-bottom: 0 !important;
    }

    .password-container input {
      padding-right: 46px !important;
    }

    .eye-icon {
      position: absolute !important;
      right: 14px !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      color: #666 !important;
      font-size: 16px !important;
      cursor: pointer !important;
      transition: color 0.2s !important;
    }

    .eye-icon:hover {
      color: var(--red) !important;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       VALIDATION HINTS
    ══════════════════════════════════════════════════════════════════════════ */
    
    .field-hint {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      margin-top: 6px;
      min-height: 16px;
      display: block;
      transition: all 0.2s;
    }

    .field-hint.ok {
      color: #00ff6a;
    }

    .field-hint.err {
      color: #ff5555;
    }

    .register-container input.input-ok {
      border-color: rgba(0, 255, 106, 0.5) !important;
      background: rgba(0, 255, 106, 0.03) !important;
    }

    .register-container input.input-err {
      border-color: rgba(255, 85, 85, 0.6) !important;
      background: rgba(255, 0, 0, 0.04) !important;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       PASSWORD STRENGTH
    ══════════════════════════════════════════════════════════════════════════ */
    
    #password-strength,
    #strength-text,
    #password-rules {
      display: none;
    }

    .strength-bar {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      margin-top: 8px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    #strength-fill {
      height: 100%;
      width: 0%;
      background: var(--red);
      border-radius: 3px;
      transition: all 0.3s ease;
    }

    #strength-text {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    #password-rules {
      color: #555;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      line-height: 1.8;
      padding-left: 16px;
      margin-top: 6px;
      margin-bottom: 0;
    }

    #password-rules li {
      margin-bottom: 2px;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       LINKS Y DIVIDERS
    ══════════════════════════════════════════════════════════════════════════ */
    
    .register-container>form>p,
    #registerForm>p {
      font-size: 13px !important;
      color: var(--muted) !important;
      margin-bottom: 0 !important;
      grid-column: 1 / -1;
      text-align: center;
    }

    .login-link {
      color: var(--red) !important;
      font-weight: 600 !important;
      text-decoration: none !important;
      transition: all 0.2s;
    }

    .login-link:hover {
      color: #fff !important;
      text-shadow: 0 0 10px var(--red);
    }

    .form-divider {
      grid-column: 1 / -1;
      height: 1px;
      background: rgba(255, 0, 0, 0.1);
      margin: 12px 0 20px;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       SUBMIT BUTTON - Más impactante
    ══════════════════════════════════════════════════════════════════════════ */
    
    .register-container button[type="submit"] {
      grid-column: 1 / -1;
      width: 100% !important;
      padding: 16px !important;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-mid) 100%) !important;
      color: #fff !important;
      border: none !important;
      border-radius: 12px !important;
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 24px !important;
      letter-spacing: 4px !important;
      cursor: pointer !important;
      margin-top: 8px !important;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease !important;
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
    }

    .register-container button[type="submit"]::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.6s ease;
    }

    .register-container button[type="submit"]:hover::before {
      left: 100%;
    }

    .register-container button[type="submit"]:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 8px 30px rgba(255, 0, 0, 0.5) !important;
    }

    .register-container button[type="submit"]:active {
      transform: translateY(0) !important;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       SOCIAL LOGIN - Más elegante
    ══════════════════════════════════════════════════════════════════════════ */
    
    .social-login {
      grid-column: 1 / -1;
      margin-top: 20px !important;
      text-align: center;
    }

    .social-login>p {
      display: flex !important;
      align-items: center !important;
      gap: 16px !important;
      font-size: 10px !important;
      color: #444 !important;
      text-transform: uppercase !important;
      letter-spacing: 2px !important;
      margin-bottom: 16px !important;
      font-weight: 500 !important;
    }

    .social-login>p::before,
    .social-login>p::after {
      content: '' !important;
      flex: 1 !important;
      height: 1px !important;
      background: rgba(255, 255, 255, 0.06) !important;
    }

    .icons {
      display: flex !important;
      justify-content: center !important;
      width: 100%;
    }

    .btn-google-full {
      width: 100% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 12px !important;
      padding: 14px !important;
      background: rgba(30, 30, 30, 0.6) !important;
      border: 1.5px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 12px !important;
      color: #f0f0f0 !important;
      font-family: 'Poppins', sans-serif !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      cursor: pointer !important;
      transition: all 0.3s ease !important;
      backdrop-filter: blur(10px);
    }

    .btn-google-full:hover {
      background: rgba(40, 40, 40, 0.8) !important;
      border-color: rgba(255, 255, 255, 0.2) !important;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .btn-google-full img {
      width: 22px !important;
      height: 22px !important;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       MOBILE TOPBAR - MEJORADA CON BOTÓN DE CIERRE FUNCIONAL
    ══════════════════════════════════════════════════════════════════════════ */
    
    .mobile-topbar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 0, 0, 0.2);
      padding: 16px 20px;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .mobile-topbar .mob-logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1;
    }

    .mobile-topbar .mob-logo-sub {
      font-size: 9px;
      color: var(--red);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
      opacity: 0.9;
    }

    /* BOTÓN DE CIERRE MÓVIL - MEJORADO Y FUNCIONAL */
    .mobile-topbar .mob-close-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255, 0, 0, 0.12);
      border: 1.5px solid rgba(255, 0, 0, 0.3);
      color: var(--red);
      font-size: 20px;
      font-weight: 300;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .mobile-topbar .mob-close-btn:hover,
    .mobile-topbar .mob-close-btn:active {
      background: rgba(255, 0, 0, 0.25);
      border-color: var(--red);
      color: #fff;
      transform: rotate(90deg);
    }

    /* ══════════════════════════════════════════════════════════════════════════
       RESPONSIVE - TABLET Y MÓVIL
    ══════════════════════════════════════════════════════════════════════════ */
    
    @media (max-width: 768px) {
      html, body {
        overflow-y: auto;
        align-items: flex-start;
      }

      /* Mostrar barra móvil */
      .mobile-topbar {
        display: flex !important;
      }

      /* Ocultar elementos de escritorio */
      .site-logo,
      .close-btn {
        display: none !important;
      }

      /* Ajustar corners */
      .hud-corner {
        width: 40px;
        height: 40px;
      }

      /* Ajustar card */
      .register-container {
        width: 94% !important;
        max-width: none !important;
        max-height: none !important;
        padding: 32px 24px 36px !important;
        margin: 80px auto 24px !important;
        border-radius: 16px !important;
      }

      /* Form a una columna */
      #registerForm {
        grid-template-columns: 1fr !important;
        gap: 0 !important;
      }

      /* Header más compacto */
      .register-container h2 {
        font-size: 38px !important;
      }

      .step-indicator {
        font-size: 42px !important;
      }

      /* Inputs más grandes y táctiles */
      .register-container input,
      .register-container select {
        padding: 15px 18px !important;
        font-size: 16px !important;
        border-radius: 12px !important;
      }

      .field-wrap label {
        font-size: 12px !important;
        margin-bottom: 10px !important;
      }

      .field-wrap {
        margin-bottom: 18px !important;
      }

      /* Botón submit más grande */
      .register-container [type="submit"] {
        padding: 18px !important;
        font-size: 22px !important;
        border-radius: 14px !important;
      }
    }

    /* Mobile pequeño */
    @media (max-width: 420px) {
      .register-container {
        width: 96% !important;
        padding: 28px 20px 32px !important;
        margin: 76px auto 20px !important;
      }

      .card-header {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 8px;
      }

      .header-right {
        display: none;
      }

      .register-container h2 {
        font-size: 32px !important;
      }

      .hud-corner {
        display: none;
      }

      .bg-grid {
        display: none;
      }
    }

    /* Animaciones */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ══════════════════════════════════════════════════════════════════════════
       GOOGLE POPUP CENTERING - Firebaseui y Google Sign-In
    ══════════════════════════════════════════════════════════════════════════ */

    /* Centrar todos los popups y modales de Google */
    div[gapi-signin-wrapper],
    div[data-gapi-signin-container],
    .goog-te-gadget-simple,
    iframe[title*="Google"],
    div[role="dialog"] {
      position: fixed !important;
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) !important;
      z-index: 9999 !important;
    }

    /* Fondo oscuro para modales de Google SignUp */
    div[role="dialog"]::before,
    .goog-te-gadget-simple::before {
      content: '' !important;
      position: fixed !important;
      inset: 0 !important;
      background: rgba(0, 0, 0, 0.6) !important;
      z-index: -1 !important;
    }

    /* Asegurar que el página no se desplace cuando aparece el popup */
    body.google-popup-open {
      overflow: hidden !important;
    }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════════════════════
       BARRA MÓVIL CON BOTÓN DE CIERRE FUNCIONAL
  ══════════════════════════════════════════════════════════════════════════ -->
  <div class="mobile-topbar">
    <div>
      <span class="mob-logo-name">FitAiid</span>
      <span class="mob-logo-sub">Transforma Tu Cuerpo</span>
    </div>
    <a href="../index.html" class="mob-close-btn" aria-label="Cerrar">×</a>
  </div>

  <!-- Background layers -->
  <div class="bg-layer"></div>
  <div class="bg-pulse"></div>
  <div class="bg-fade"></div>
  <div class="bg-grid"></div>

  <!-- HUD corners -->
  <div class="hud-corner hc-tl"></div>
  <div class="hud-corner hc-tr"></div>
  <div class="hud-corner hc-bl"></div>
  <div class="hud-corner hc-br"></div>

  <!-- Logo (desktop) -->
  <div class="site-logo">
    <img src="../img/logo.png" alt="FitAiid Logo" class="logo-image">
    <div>
      <div class="logo-name">FitAiid</div>
      <div class="logo-sub">Transforma Tu Cuerpo</div>
    </div>
  </div>

  <!-- Close button (desktop) -->
  <a href="../index.html" class="close-btn" aria-label="Cerrar">×</a>

  <!-- ══════════════════════════════════════════════════════════════════════════
       CARD PRINCIPAL
  ══════════════════════════════════════════════════════════════════════════ -->
  <div class="register-container">

    <!-- Header -->
    <div class="card-header">
      <div class="header-left">
        <p class="eyebrow">Nueva cuenta</p>
        <h2>REGÍSTRATE</h2>
      </div>
      <div class="header-right">
        <div class="step-indicator">01</div>
        <div class="step-label">Datos personales</div>
      </div>
    </div>

    <!-- Message box -->
    <div id="msgBox" class="msg-box" style="display:none;"></div>

    <form id="registerForm">

      <!-- Nombre | Apellido -->
      <div class="field-wrap">
        <label for="firstName">Nombre</label>
        <input type="text" id="firstName" placeholder="Tu nombre" required 
          pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]{2,50}" />
        <span class="field-hint" id="hint-firstName"></span>
      </div>

      <div class="field-wrap">
        <label for="lastName">Apellido</label>
        <input type="text" id="lastName" placeholder="Tu apellido" required 
          pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]{2,50}" />
        <span class="field-hint" id="hint-lastName"></span>
      </div>

      <!-- Teléfono | Correo -->
      <div class="field-wrap">
        <label for="phone">Teléfono</label>
        <input type="number" id="phone" placeholder="Número de teléfono" required 
          pattern="^\d{10}$" />
        <span class="field-hint" id="hint-phone"></span>
      </div>

      <div class="field-wrap">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" required />
        <span class="field-hint" id="hint-email"></span>
      </div>

      <!-- Contraseña | Confirmar -->
      <div class="field-wrap">
        <label for="password">Contraseña</label>
        <div class="password-container">
          <input type="password" id="password" placeholder="Contraseña" required />
          <i id="togglePassword" class="fa-solid fa-eye eye-icon"></i>
        </div>
      </div>

      <div class="field-wrap">
        <label for="confirmPassword">Confirmar contraseña</label>
        <div class="password-container">
          <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required />
          <i id="toggleConfirmPassword" class="fa-solid fa-eye eye-icon"></i>
        </div>
        <span class="field-hint" id="hint-confirm"></span>
      </div>

      <!-- Strength bar -->
      <div class="full">
        <div id="password-strength" class="strength-bar">
          <div id="strength-fill"></div>
        </div>
        <p id="strength-text"></p>
        <ul id="password-rules">
          <li id="rule-length">Mínimo 6 caracteres</li>
          <li id="rule-uppercase">Una letra mayúscula (A-Z)</li>
          <li id="rule-lowercase">Una letra minúscula (a-z)</li>
          <li id="rule-number">Un número (0-9)</li>
          <li id="rule-symbol">Un símbolo (!@#$%&*.)</li>
        </ul>
      </div>

      <!-- Link login -->
      <p class="full">¿Ya tienes cuenta? <a href="login.html" class="login-link">Inicia sesión</a></p>

      <div class="form-divider full"></div>

      <!-- Submit button -->
      <button type="submit">Continuar</button>

      <!-- Social login -->
      <div class="social-login full">
        <p>O regístrate con</p>
        <div class="icons">
          <button class="btn-google-full" type="button">
            <img src="https://png.pngtree.com/png-vector/20230817/ourmid/pngtree-google-internet-icon-vector-png-image_9183287.png" 
              alt="Google" />
            Continuar con Google
          </button>
        </div>
      </div>

    </form>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════════
       SCRIPTS
  ══════════════════════════════════════════════════════════════════════════ -->

  <!-- Toggle password visibility -->
  <script>
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const togglePassword = document.getElementById("togglePassword");
    const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");

    togglePassword.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      togglePassword.classList.toggle("fa-eye");
      togglePassword.classList.toggle("fa-eye-slash");
    });

    toggleConfirmPassword.addEventListener("click", () => {
      const isPassword = confirmPasswordInput.type === "password";
      confirmPasswordInput.type = isPassword ? "text" : "password";
      toggleConfirmPassword.classList.toggle("fa-eye");
      toggleConfirmPassword.classList.toggle("fa-eye-slash");
    });
  </script>

  <!-- Firebase configuration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzpmKxgVzx6qHgEAsz82xSHM8ANjF8HTI",
      authDomain: "fitaiid-9c617.firebaseapp.com",
      projectId: "fitaiid-9c617",
      storageBucket: "fitaiid-9c617.firebasestorage.app",

    };

    const app = initializeApp(firebaseConfig);

  <!-- Main register script -->
  <script type="module" src="../scripts/register.js"></script>

  <!-- Real-time validation -->
  <script>
    function setFieldState(inputEl, hintEl, isOk, msg) {
      inputEl.classList.remove('input-ok', 'input-err');
      hintEl.classList.remove('ok', 'err');
      if (msg === '') { 
        hintEl.textContent = ''; 
        return; 
      }
      inputEl.classList.add(isOk ? 'input-ok' : 'input-err');
      hintEl.classList.add(isOk ? 'ok' : 'err');
      hintEl.textContent = msg;
    }

    const soloLetras = /^[A-Za-zÁÉÍÓÚáéíóúñÑ\s]{2,50}$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // Nombre
    const fnInput = document.getElementById('firstName');
    const fnHint = document.getElementById('hint-firstName');
    fnInput.addEventListener('input', () => {
      const v = fnInput.value;
      if (/\d/.test(v)) {
        fnInput.value = v.replace(/\d/g, '');
        setFieldState(fnInput, fnHint, false, '⚠ Solo letras');
        return;
      }
      if (v.length === 0) setFieldState(fnInput, fnHint, false, '');
      else if (v.trim().length < 2) setFieldState(fnInput, fnHint, false, '⚠ Mínimo 2 letras');
      else if (!soloLetras.test(v)) setFieldState(fnInput, fnHint, false, '⚠ Solo letras');
      else setFieldState(fnInput, fnHint, true, '✓ Válido');
    });

    // Apellido
    const lnInput = document.getElementById('lastName');
    const lnHint = document.getElementById('hint-lastName');
    lnInput.addEventListener('input', () => {
      const v = lnInput.value;
      if (/\d/.test(v)) {
        lnInput.value = v.replace(/\d/g, '');
        setFieldState(lnInput, lnHint, false, '⚠ Solo letras');
        return;
      }
      if (v.length === 0) setFieldState(lnInput, lnHint, false, '');
      else if (v.trim().length < 2) setFieldState(lnInput, lnHint, false, '⚠ Mínimo 2 letras');
      else if (!soloLetras.test(v)) setFieldState(lnInput, lnHint, false, '⚠ Solo letras');
      else setFieldState(lnInput, lnHint, true, '✓ Válido');
    });

    // Teléfono
    const phInput = document.getElementById('phone');
    const phHint = document.getElementById('hint-phone');
    phInput.addEventListener('input', () => {
      let v = phInput.value.toString().replace(/\D/g, '');
      if (v.length > 10) {
        v = v.slice(0, 10);
        phInput.value = v;
      }
      if (v.length === 0) setFieldState(phInput, phHint, false, '');
      else if (v.length < 10) setFieldState(phInput, phHint, false, `⚠ Faltan ${10 - v.length} dígitos (${v.length}/10)`);
      else setFieldState(phInput, phHint, true, '✓ Válido');
    });

    // Email
    const emInput = document.getElementById('email');
    const emHint = document.getElementById('hint-email');
    emInput.addEventListener('input', () => {
      const v = emInput.value;
      if (v.length === 0) setFieldState(emInput, emHint, false, '');
      else if (!emailRegex.test(v)) setFieldState(emInput, emHint, false, '⚠ Correo inválido');
      else setFieldState(emInput, emHint, true, '✓ Válido');
    });

    // Confirmar contraseña
    const pwInput = document.getElementById('password');
    const cpInput = document.getElementById('confirmPassword');
    const cpHint = document.getElementById('hint-confirm');

    function checkConfirm() {
      const pw = pwInput.value;
      const cp = cpInput.value;
      if (cp.length === 0) setFieldState(cpInput, cpHint, false, '');
      else if (pw !== cp) setFieldState(cpInput, cpHint, false, '⚠ No coinciden');
      else setFieldState(cpInput, cpHint, true, '✓ Coinciden');
    }
    cpInput.addEventListener('input', checkConfirm);
    pwInput.addEventListener('input', checkConfirm);
  </script>

  <!-- Google button click redirect -->
  <script>
    document.querySelector('.btn-google-full').addEventListener('click', function (e) {
      e.stopPropagation();
      this.querySelector('img[alt="Google"]').click();
    });
  </script>

  <!-- Message box auto-hide -->
  <script>
    const msgEl = document.getElementById('msgBox');
    let hideTimer = null;

    const observer = new MutationObserver(() => {
      const isVisible = msgEl.style.display !== 'none' && msgEl.style.display !== '';
      if (isVisible) {
        clearTimeout(hideTimer);
        msgEl.classList.remove('hiding');
        hideTimer = setTimeout(() => {
          msgEl.classList.add('hiding');
          setTimeout(() => {
            msgEl.style.display = 'none';
            msgEl.classList.remove('hiding');
          }, 600);
        }, 5000);
      }
    });

    observer.observe(msgEl, { attributes: true, attributeFilter: ['style'] });
  </script>

</body>
